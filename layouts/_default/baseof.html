<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

    <!-- KaTeX for LaTeX -->
    {{ if .Params.math | default true }}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ]
            });
        });
    </script>
    {{ end }}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        {{ partial "sidebar.html" . }}
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Main Content Area -->
        <div class="main-area">
            <header class="site-header">
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle Sidebar">☰</button>
                <a href="{{ "" | relURL }}" class="site-title-link"><h1>{{ .Site.Title }}</h1></a>
            </header>

            <main class="content-wrapper">
                {{- block "main" . }}{{- end }}
            </main>

            <footer style="margin-top: 5rem; padding-bottom: 2rem; border-top: 1px solid var(--border-color); color: #8b949e; font-size: 0.9rem;">
                <p>&copy; {{ now.Format "2006" }} {{ .Site.Title }}. Built with Hugo.</p>
            </footer>
        </div>
    </div>

    <!-- Interactive JS for Navigation -->
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('active');
        }

        function toggleFolder(headerElement, event) {
            // Let normal link navigation happen if clicked directly on the anchor
            if (event.target.tagName.toLowerCase() === 'a') {
                return;
            }
            event.preventDefault();
            event.stopPropagation();
            
            const folderItem = headerElement.closest('.tree-item.folder');
            const content = folderItem.querySelector('.folder-content');
            const arrow = headerElement.querySelector('.toggle-arrow');
            
            if (content.style.display === 'none') {
                content.style.display = 'block';
                arrow.textContent = '▼';
                folderItem.classList.add('open');
            } else {
                content.style.display = 'none';
                arrow.textContent = '▶';
                folderItem.classList.remove('open');
            }
        }

        function filterTree() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.file-title-link, .folder-title');
            
            if (!query) {
                // Restore default visibility
                document.querySelectorAll('.tree-item').forEach(item => {
                    item.style.display = '';
                });
                document.querySelectorAll('.folder-content').forEach(content => {
                    const folderItem = content.closest('.tree-item.folder');
                    if (folderItem.classList.contains('open')) {
                        content.style.display = 'block';
                        folderItem.querySelector('.toggle-arrow').textContent = '▼';
                    } else {
                        content.style.display = 'none';
                        folderItem.querySelector('.toggle-arrow').textContent = '▶';
                    }
                });
                return;
            }

            // Hide everything first
            document.querySelectorAll('.tree-item').forEach(item => {
                item.style.display = 'none';
            });

            // Show matched elements and their ancestors
            items.forEach(el => {
                const text = el.textContent.toLowerCase();
                if (text.includes(query)) {
                    const item = el.closest('.tree-item');
                    if (item) {
                        item.style.display = '';
                        
                        // Traverse up and expand parents
                        let parent = item.parentElement.closest('.tree-item.folder');
                        while (parent) {
                            parent.style.display = '';
                            parent.classList.add('open');
                            const content = parent.querySelector('.folder-content');
                            if (content) content.style.display = 'block';
                            const arrow = parent.querySelector('.toggle-arrow');
                            if (arrow) arrow.textContent = '▼';
                            parent = parent.parentElement.closest('.tree-item.folder');
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
