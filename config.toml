baseURL = "https://Utsab-2010.github.io/Notes-Host/"
languageCode = "en-us"
title = "Utsab's Digital Garden"
canonifyURLs = true

ignoreFiles = [
  "\\.obsidian",
  "\\.git",
  "^Journal",
  "Internship Applications\\.md",
  "Project Ideas\\.md"
]

[params]
  description = "A collection of technical notes, research logs, and digital garden entries."
  math = true

[frontmatter]
  lastmod = [":git", ":fileModTime", "lastmod", "date"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"], ["$", "$"]]
